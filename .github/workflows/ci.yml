# Nivesh Terminal — backend CI (Phase 0 guardrails + tests).
# Blocking gate: architecture guardrails, style lint, and the test suite.
# NOTE: pushing files under .github/workflows/ requires a token with the `workflow`
# scope. If the automation token lacks it, add this file via the GitHub UI (as done
# for deploy/snapshots.workflow.yml). `make check` runs the identical gate locally.
name: CI

on:
  push:
  pull_request:

jobs:
  guardrails-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Architecture guardrails
        run: python -m tools.ci.check
      - name: Lint
        run: python -m ruff check backend tools
      - name: Tests
        run: python -m pytest
