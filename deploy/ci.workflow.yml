# Nivesh Terminal — backend CI (Phase 0 guardrails + tests).
# Blocking gate: architecture guardrails, style lint, and the test suite.
#
# ACTIVATION (one manual step — same constraint as deploy/snapshots.workflow.yml):
# this file lives here rather than under .github/workflows/ because pushing there
# requires a token with the `workflow` scope, which the automation token lacks.
# To turn CI on, either:
#   - In GitHub: Add file -> Create new file at `.github/workflows/ci.yml`, paste
#     these contents, commit; or
#   - Grant the PAT the `workflow` scope, then
#     `git mv deploy/ci.workflow.yml .github/workflows/ci.yml` and push.
# Until then `make check` runs the identical gate locally.
name: CI

on:
  push:
  pull_request:

jobs:
  guardrails-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Architecture guardrails
        run: python -m tools.ci.check
      - name: Lint
        run: python -m ruff check backend tools
      - name: Tests
        run: python -m pytest
